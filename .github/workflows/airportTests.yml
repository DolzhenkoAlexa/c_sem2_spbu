name: Tests

on:
  - push
  - pull_request

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compile tests
        run: gcc -Wall -Wextra tests/airportTests.c src/hw_3/airport.c -o test_airport -I.

      - name: Run tests
        run: ./test_airport